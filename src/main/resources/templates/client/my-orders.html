<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đơn hàng của tôi</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

<div th:replace="~{client/menu :: menu}"></div>

<div class="container mt-5">

    <h3 class="mb-4">Đơn hàng của tôi</h3>

    <table class="table table-bordered align-middle">

        <thead class="table-dark">
        <tr>
            <th>Mã đơn</th>
            <th>Ngày</th>
            <th>Tổng tiền</th>
            <th>Thanh toán</th>
            <th>Trạng thái</th>
            <th></th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="o : ${orders}">

            <td th:text="${o.maDonHang}"></td>

            <td th:text="${#temporals.format(o.ngayTao,'dd-MM-yyyy HH:mm')}"></td>

            <td class="text-danger fw-bold"
                th:text="${#numbers.formatDecimal(o.tongTien,0,'COMMA',0,'POINT')} + ' VND'">
            </td>

            <td th:text="${o.phuongThucThanhToan}"></td>

            <td>
<span class="badge bg-warning"
      th:if="${o.trangThaiId == 1}">
      Chờ xác nhận
</span>

                <span class="badge bg-info"
                      th:if="${o.trangThaiId == 2}">
      Đã xác nhận
</span>

                <span class="badge bg-primary"
                      th:if="${o.trangThaiId == 3}">
      Đang giao
</span>

                <span class="badge bg-success"
                      th:if="${o.trangThaiId == 4}">
      Hoàn thành
</span>

                <span class="badge bg-danger"
                      th:if="${o.trangThaiId == 5}">
      Đã hủy
</span>
            </td>

            <td>

                <a class="btn btn-sm btn-dark"
                   th:href="@{/order/detail/{id}(id=${o.id})}">
                    Xem chi tiết
                </a>

            </td>

        </tr>

        </tbody>

    </table>

</div>

</body>
</html>
