<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="filter">
    <form method="get" th:action="@{/shop/product}">
        <div class="filter-box">
            <div class="filter-title">Bộ lọc</div>

            <div class="filter-group">
                <h6>Kích thước</h6>

                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="sizeIds" value="11" id="size11"
                           th:checked="${selectedSizeIds != null and #lists.contains(selectedSizeIds, 11)}">
                    <label class="form-check-label" for="size11">M</label>
                </div>

                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="sizeIds" value="12" id="size12"
                           th:checked="${selectedSizeIds != null and #lists.contains(selectedSizeIds, 12)}">
                    <label class="form-check-label" for="size12">L</label>
                </div>
            </div>

            <div class="filter-group">
                <h6>Mức giá</h6>

                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="prices" value="duoi-300" id="price1"
                           th:checked="${selectedPrices != null and #lists.contains(selectedPrices, 'duoi-300')}">
                    <label class="form-check-label" for="price1">Dưới 300.000đ</label>
                </div>

                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="prices" value="300-500" id="price2"
                           th:checked="${selectedPrices != null and #lists.contains(selectedPrices, '300-500')}">
                    <label class="form-check-label" for="price2">300.000đ - 500.000đ</label>
                </div>

                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="prices" value="tren-500" id="price3"
                           th:checked="${selectedPrices != null and #lists.contains(selectedPrices, 'tren-500')}">
                    <label class="form-check-label" for="price3">Trên 500.000đ</label>
                </div>
            </div>

            <div class="filter-group">
                <h6>Màu sắc</h6>

                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="mauIds" value="15" id="mau15"
                           th:checked="${selectedMauIds != null and #lists.contains(selectedMauIds, 15)}">
                    <label class="form-check-label" for="mau15">Đỏ</label>
                </div>

                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="mauIds" value="16" id="mau16"
                           th:checked="${selectedMauIds != null and #lists.contains(selectedMauIds, 16)}">
                    <label class="form-check-label" for="mau16">Xanh</label>
                </div>

                <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="mauIds" value="17" id="mau17"
                           th:checked="${selectedMauIds != null and #lists.contains(selectedMauIds, 17)}">
                    <label class="form-check-label" for="mau17">Đen</label>
                </div>
            </div>

            <button type="submit" class="btn btn-dark w-100 mb-2">Áp dụng bộ lọc</button>
            <a th:href="@{/shop/product}" class="btn btn-outline-secondary w-100">Xóa bộ lọc</a>
        </div>
    </form>
</div>
</body>
</html>
