<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="filter">
    <form method="get" th:action="@{/shop/product}" id="filterForm">
        <div class="filter-box">
            <div class="filter-title">Bộ lọc</div>

            <!-- Giữ sort nếu đang dùng -->
            <input type="hidden" name="sort" th:value="${selectedSort}">

            <div class="filter-group">
                <h6>Kích thước</h6>

                <div class="form-check" th:each="size : ${kichCos}">
                    <input class="form-check-input"
                           type="checkbox"
                           name="sizeIds"
                           th:value="${size.id}"
                           th:id="'size' + ${size.id}"
                           th:checked="${selectedSizeIds != null and #lists.contains(selectedSizeIds, size.id)}"
                           onchange="document.getElementById('filterForm').submit()">

                    <label class="form-check-label"
                           th:for="'size' + ${size.id}"
                           th:text="${size.tenKichCo}">
                        Size
                    </label>
                </div>
            </div>

            <div class="filter-group">
                <h6>Mức giá</h6>

                <div class="form-check">
                    <input class="form-check-input"
                           type="radio"
                           name="price"
                           value=""
                           id="price0"
                           th:checked="${selectedPrice == null or selectedPrice == ''}"
                           onchange="document.getElementById('filterForm').submit()">
                    <label class="form-check-label" for="price0">Tất cả</label>
                </div>

                <div class="form-check">
                    <input class="form-check-input"
                           type="radio"
                           name="price"
                           value="duoi-300"
                           id="price1"
                           th:checked="${selectedPrice == 'duoi-300'}"
                           onchange="document.getElementById('filterForm').submit()">
                    <label class="form-check-label" for="price1">Dưới 300.000đ</label>
                </div>

                <div class="form-check">
                    <input class="form-check-input"
                           type="radio"
                           name="price"
                           value="300-500"
                           id="price2"
                           th:checked="${selectedPrice == '300-500'}"
                           onchange="document.getElementById('filterForm').submit()">
                    <label class="form-check-label" for="price2">300.000đ - 500.000đ</label>
                </div>

                <div class="form-check">
                    <input class="form-check-input"
                           type="radio"
                           name="price"
                           value="tren-500"
                           id="price3"
                           th:checked="${selectedPrice == 'tren-500'}"
                           onchange="document.getElementById('filterForm').submit()">
                    <label class="form-check-label" for="price3">Trên 500.000đ</label>
                </div>
            </div>

            <div class="filter-group">
                <h6>Màu sắc</h6>

                <div class="form-check" th:each="mau : ${mauSacs}">
                    <input class="form-check-input"
                           type="checkbox"
                           name="mauIds"
                           th:value="${mau.id}"
                           th:id="'mau' + ${mau.id}"
                           th:checked="${selectedMauIds != null and #lists.contains(selectedMauIds, mau.id)}"
                           onchange="document.getElementById('filterForm').submit()">

                    <label class="form-check-label"
                           th:for="'mau' + ${mau.id}"
                           th:text="${mau.tenMau}">
                        Màu
                    </label>
                </div>
            </div>

            <a th:href="@{/shop/product}" class="btn btn-outline-secondary w-100">
                Xóa bộ lọc
            </a>
        </div>
    </form>
</div>
</body>
</html>
