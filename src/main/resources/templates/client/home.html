<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh sách sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
            font-family: Arial, sans-serif;
        }

        .page-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .filter-box {
            background: #fff;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            position: sticky;
            top: 20px;
        }

        .filter-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .filter-group {
            margin-bottom: 24px;
        }

        .filter-group h6 {
            font-weight: 700;
            margin-bottom: 12px;
        }

        .size-option {
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 8px 14px;
            background: #fff;
            transition: all 0.2s ease;
            cursor: pointer;
            font-weight: 500;
        }

        .size-option:hover {
            background: #000;
            color: #fff;
            border-color: #000;
        }

        .product-card {
            border: none;
            border-radius: 18px;
            overflow: hidden;
            background: #fff;
            box-shadow: 0 6px 20px rgba(0,0,0,0.06);
            transition: all 0.25s ease;
            height: 100%;
        }

        .product-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.12);
        }

        .product-image-wrap {
            position: relative;
            background: #f3f3f3;
        }

        .product-image {
            width: 100%;
            height: 320px;
            object-fit: cover;
        }

        .badge-custom {
            position: absolute;
            top: 14px;
            left: 14px;
            background: #000;
            color: #fff;
            font-size: 12px;
            padding: 6px 10px;
            border-radius: 20px;
            font-weight: 600;
        }

        .discount-badge {
            display: inline-block;
            background: #2d5bff;
            color: white;
            font-size: 13px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 16px;
            margin-left: 8px;
        }

        .product-name {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 10px;
            min-height: 48px;
        }

        .price-current {
            color: #111;
            font-size: 24px;
            font-weight: 700;
        }

        .price-old {
            color: #999;
            text-decoration: line-through;
            margin-left: 8px;
            font-size: 16px;
        }

        .product-actions .btn {
            border-radius: 12px;
            font-weight: 600;
        }

        .sort-box {
            background: #fff;
            border-radius: 12px;
            padding: 8px 14px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.05);
        }

        .top-bar {
            margin-bottom: 20px;
        }

        .result-count {
            color: #666;
            font-size: 15px;
            margin-top: 8px;
        }

        .color-dots {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .color-dot {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 1px solid #ccc;
            display: inline-block;
        }

        .btn-view {
            background: #111;
            color: #fff;
            border: none;
        }

        .btn-view:hover {
            background: #333;
            color: #fff;
        }

        .btn-outline-dark {
            border-radius: 12px;
        }

        @media (max-width: 991px) {
            .filter-box {
                position: static;
                margin-bottom: 20px;
            }

            .page-title {
                font-size: 26px;
            }

            .product-image {
                height: 260px;
            }
        }
    </style>
</head>
<body>
<div th:replace="~{client/menu :: menu}"></div>
<div class="container py-4">

    <div class="row">
        <!-- Sidebar bộ lọc -->
        <div class="col-lg-3 mb-4">
            <div class="filter-box">
                <div class="filter-title">Bộ lọc</div>

                <div class="filter-group">
                    <h6>Kích thước</h6>
                    <div class="d-flex flex-wrap gap-2">
                        <span class="size-option">XS</span>
                        <span class="size-option">S</span>
                        <span class="size-option">M</span>
                        <span class="size-option">L</span>
                        <span class="size-option">XL</span>
                        <span class="size-option">2XL</span>
                        <span class="size-option">3XL</span>
                    </div>
                </div>

                <div class="filter-group">
                    <h6>Mức giá</h6>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="price1">
                        <label class="form-check-label" for="price1">Dưới 300.000đ</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="price2">
                        <label class="form-check-label" for="price2">300.000đ - 500.000đ</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="price3">
                        <label class="form-check-label" for="price3">Trên 500.000đ</label>
                    </div>
                </div>

                <div class="filter-group">
                    <h6>Màu sắc</h6>
                    <div class="color-dots">
                        <span class="color-dot" style="background:#000;"></span>
                        <span class="color-dot" style="background:#ffffff;"></span>
                        <span class="color-dot" style="background:#1f3c88;"></span>
                        <span class="color-dot" style="background:#b0b0b0;"></span>
                    </div>
                </div>

                <button class="btn btn-dark w-100">Áp dụng bộ lọc</button>
            </div>
        </div>

        <!-- Nội dung sản phẩm -->
        <div class="col-lg-9">
            <div class="d-flex justify-content-between align-items-center flex-wrap top-bar">
                <div>
                    <h2 class="page-title">Danh sách sản phẩm</h2>
                    <div class="result-count">
                        Tổng:
                        <span th:text="${#lists.size(products)}">0</span> sản phẩm
                    </div>
                </div>

                <div class="sort-box mt-3 mt-lg-0">
                    <label class="me-2 fw-semibold">Sắp xếp:</label>
                    <select class="form-select d-inline-block w-auto">
                        <option>Mặc định</option>
                        <option>Giá tăng dần</option>
                        <option>Giá giảm dần</option>
                        <option>Mới nhất</option>
                    </select>
                </div>
            </div>

            <div class="row g-4">
                <div class="col-md-6 col-xl-4" th:each="p : ${products}">
                    <div class="product-card">

                        <div class="product-image-wrap">
                            <!-- Badge -->
                            <span class="badge-custom">Nổi bật</span>

                            <!-- Ảnh -->
                            <a th:href="@{/shop/detail/{id}(id=${p.id})}">
                                <img th:src="@{'/images/' + ${p.hinhAnh}}"
                                     class="product-image"
                                     alt="Ảnh sản phẩm">
                            </a>
                        </div>

                        <div class="p-3">
                            <!-- Màu giả lập giao diện đẹp -->
                            <div class="color-dots">
                                <span class="color-dot" style="background:#1f2a44;"></span>
                                <span class="color-dot" style="background:#d9d9d9;"></span>
                                <span class="color-dot" style="background:#8fa3bf;"></span>
                            </div>

                            <!-- Tên -->
                            <div class="product-name" th:text="${p.tenSanPham}">
                                Tên sản phẩm
                            </div>

                            <!-- Giá -->
                            <div class="mb-3">
                                <span class="price-current"
                                      th:text="${#numbers.formatDecimal(p.giaMacDinh,0,'COMMA',0,'POINT')} + 'đ'">

                                </span>

                                <!-- Giá cũ giả lập để giao diện giống shop -->

                            </div>

                            <!-- Nút -->
                            <div class="product-actions d-grid gap-2">
                                <a th:href="@{/shop/detail/{id}(id=${p.id})}"
                                   class="btn btn-view">
                                    Xem chi tiết
                                </a>

                                <a th:href="@{/shop/detail/{id}(id=${p.id})}"
                                   class="btn btn-outline-dark">
                                    Mua ngay
                                </a>
                            </div>
                        </div>

                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
