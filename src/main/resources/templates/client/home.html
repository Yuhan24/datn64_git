<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh sách sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/product-list-client.css}">
</head>
<body>
<div th:replace="~{client/menu :: menu}"></div>

<div class="container py-4">
    <div class="row g-4 align-items-start">

        <!-- Nội dung sản phẩm -->
        <div class="col-lg-9">
            <div class="d-flex justify-content-between align-items-center flex-wrap top-bar">
                <div>
                    <h2 class="page-title">Danh sách sản phẩm</h2>
                    <div class="result-count">
                        Tổng:
                        <span th:text="${products != null ? #lists.size(products) : 0}">0</span> sản phẩm
                    </div>
                </div>

                <div class="sort-box mt-3 mt-lg-0">
                    <form method="get" th:action="@{/shop/product}" class="d-flex align-items-center gap-2">

                        <input type="hidden" name="mauIds"
                               th:each="m : ${selectedMauIds}"
                               th:value="${m}">

                        <input type="hidden" name="sizeIds"
                               th:each="s : ${selectedSizeIds}"
                               th:value="${s}">

                        <input type="hidden" name="prices"
                               th:each="p : ${selectedPrices}"
                               th:value="${p}">

                        <label class="fw-semibold mb-0">Sắp xếp:</label>

                        <select name="sort" class="form-select w-auto" onchange="this.form.submit()">
                            <option value="" th:selected="${selectedSort == null or selectedSort == ''}">Mặc định</option>
                            <option value="gia-tang" th:selected="${selectedSort == 'gia-tang'}">Giá tăng dần</option>
                            <option value="gia-giam" th:selected="${selectedSort == 'gia-giam'}">Giá giảm dần</option>
                        </select>
                    </form>
                </div>
            </div>

            <div class="row g-4">
                <div class="col-md-6 col-xl-4"
                     th:each="p : ${products}"
                     th:if="${p.chiTietList != null and !#lists.isEmpty(p.chiTietList)}">
                    <div class="product-card">

                        <div class="product-image-wrap">
                            <span class="badge-custom">Nổi bật</span>

                            <a th:href="@{/shop/detail/{id}(id=${p.id})}">
                                <img th:src="@{'/images/' + ${p.hinhAnh}}"
                                     class="product-image"
                                     alt="Ảnh sản phẩm">
                            </a>
                        </div>

                        <div class="p-3">
                            <div class="product-name" th:text="${p.tenSanPham}">
                                Tên sản phẩm
                            </div>

                            <div class="mb-3">
                    <span class="price-current"
                          th:text="${#numbers.formatDecimal(p.giaMacDinh,0,'COMMA',0,'POINT')} + 'đ'">
                    </span>
                            </div>

                            <div class="product-actions d-grid gap-2">
                                <a th:href="@{/shop/detail/{id}(id=${p.id})}"
                                   class="btn btn-view">
                                    Xem chi tiết
                                </a>

                                <a th:href="@{/shop/detail/{id}(id=${p.id})}"
                                   class="btn btn-outline-dark">
                                    Mua ngay
                                </a>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>

        <!-- Bộ lọc bên phải -->
        <div class="col-lg-3">
            <div th:replace="~{client/filter :: filter}"></div>
        </div>

    </div>
</div>

</body>
</html>
