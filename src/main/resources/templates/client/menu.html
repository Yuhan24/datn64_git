<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<nav th:fragment="menu" class="navbar navbar-expand-lg bg-white border-bottom shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/shop/home}">SHOP ÁO SƠ MI</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarShop">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarShop">

            <!-- MENU GIỮA -->
            <ul class="navbar-nav mx-auto gap-3">

                <li class="nav-item">
                    <a class="nav-link"
                       th:href="@{/shop/home}"
                       th:classappend="${activeMenu == 'home'} ? ' active fw-bold text-dark' : ''">
                        Trang chủ
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                       th:href="@{/shop/product}"
                       th:classappend="${activeMenu == 'product'} ? ' active fw-bold text-dark' : ''">
                        Sản phẩm
                    </a>
                </li>

                <!-- THÊM MỤC XEM ĐƠN HÀNG -->
                <li class="nav-item">
                    <a class="nav-link"
                       th:href="@{/order/my-orders}"
                       th:classappend="${activeMenu == 'orders'} ? ' active fw-bold text-dark' : ''">
                        Đơn hàng của tôi
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                       th:href="@{/shop/contact}"
                       th:classappend="${activeMenu == 'contact'} ? ' active fw-bold text-dark' : ''">
                        Liên hệ
                    </a>
                </li>

            </ul>

            <!-- BÊN PHẢI -->
            <div class="d-flex align-items-center gap-2">

                <a class="btn btn-outline-dark"
                   th:href="@{/cart}"
                   th:classappend="${activeMenu == 'cart'} ? ' fw-bold' : ''">
                    Giỏ hàng
                </a>

            </div>
        </div>
    </div>
</nav>
</body>
</html>
