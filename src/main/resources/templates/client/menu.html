<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<nav th:fragment="menu" class="haly-navbar navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand haly-brand" th:href="@{/shop/home}">
            <span class="brand-dot"></span>
            HaLy
        </a>

        <button class="navbar-toggler haly-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarShop">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarShop">

            <ul class="navbar-nav mx-auto haly-menu">
                <li class="nav-item">
                    <a class="nav-link"
                       th:href="@{/shop/home}"
                       th:classappend="${activeMenu == 'home'} ? ' active' : ''">
                        Trang chủ
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                       th:href="@{/shop/product}"
                       th:classappend="${activeMenu == 'product'} ? ' active' : ''">
                        Sản phẩm
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                       th:href="@{/shop/category/ao-ngan-tay}"
                       th:classappend="${activeMenu == 'ao-ngan-tay'} ? ' active' : ''">
                        Áo ngắn tay
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                       th:href="@{/shop/category/ao-dai-tay}"
                       th:classappend="${activeMenu == 'ao-dai-tay'} ? ' active' : ''">
                        Áo dài tay
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                       th:href="@{/shop/category/polo}"
                       th:classappend="${activeMenu == 'polo'} ? ' active' : ''">
                        Polo
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                       th:href="@{/order/my-orders}"
                       th:classappend="${activeMenu == 'orders'} ? ' active' : ''">
                        Đơn hàng
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                       th:href="@{/shop/contact}"
                       th:classappend="${activeMenu == 'contact'} ? ' active' : ''">
                        Liên hệ
                    </a>
                </li>
            </ul>

            <div class="d-flex align-items-center gap-2 haly-right">
                <a class="btn haly-cart-btn"
                   th:href="@{/cart}"
                   th:classappend="${activeMenu == 'cart'} ? ' active' : ''">
                    Giỏ hàng
                </a>
            </div>
        </div>
    </div>

    <style>
        .haly-navbar{
            position: sticky;
            top: 0;
            z-index: 999;
            background: rgba(255,255,255,.85);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-bottom: 1px solid rgba(226,232,240,.9);
            box-shadow: 0 10px 30px rgba(15,23,42,.04);
            padding: 14px 0;
        }

        .haly-brand{
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.35rem;
            font-weight: 800;
            color: #0f172a !important;
            letter-spacing: -.4px;
        }

        .brand-dot{
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: linear-gradient(135deg, #c79a3b, #e0b85e);
            box-shadow: 0 0 0 6px rgba(199,154,59,.14);
        }

        .haly-menu{
            gap: 8px;
            flex-wrap: wrap;
        }

        .haly-menu .nav-link{
            position: relative;
            color: #475569;
            font-weight: 600;
            padding: 10px 16px !important;
            border-radius: 12px;
            transition: .25s ease;
            white-space: nowrap;
        }

        .haly-menu .nav-link:hover{
            color: #0f172a;
            background: #f8fafc;
        }

        .haly-menu .nav-link.active{
            color: #0f172a !important;
            background: #f1f5f9;
            font-weight: 700;
        }

        .haly-cart-btn{
            height: 44px;
            padding: 0 18px;
            border-radius: 14px;
            border: 1px solid #e2e8f0;
            background: #111827;
            color: #fff;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: .25s;
        }

        .haly-cart-btn:hover{
            background: #1f2937;
            color: #fff;
        }

        .haly-cart-btn.active{
            background: #0f172a;
            color: #fff;
        }

        .haly-toggler{
            border: none;
            box-shadow: none !important;
        }

        @media (max-width: 991px){
            .haly-menu{
                padding-top: 14px;
                padding-bottom: 8px;
                gap: 4px;
            }

            .haly-right{
                padding-top: 8px;
            }
        }
    </style>
</nav>
</body>
</html>
