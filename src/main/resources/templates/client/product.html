<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>HaLy - Trang chủ</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div th:replace="~{client/menu :: menu}"></div>

<div class="home-page">
    <div class="container">

        <!-- BANNER -->


        <!-- INTRO -->
        <section class="intro-section">
            <div class="intro-content">
                <h2>HaLy Shirt</h2>
                <p>
                    Phong cách tối giản – hiện đại – dễ phối.
                    Tập trung vào chất liệu và form dáng chuẩn.
                </p>
            </div>
        </section>



        <!-- PRODUCT -->
        <div class="product-grid" th:if="${products != null and !#lists.isEmpty(products)}">
            <div class="product-card"
                 th:each="p : ${products}"
                 th:if="${p.chiTietList != null and !#lists.isEmpty(p.chiTietList)}">

                <div class="product-image-wrap">
                    <span class="product-badge">HaLy</span>

                    <a th:href="@{/shop/detail/{id}(id=${p.id})}" class="product-image-link">
                        <img th:src="@{'/images/' + ${p.hinhAnh}}" class="product-image">

                        <div class="image-overlay">
                            <span>Xem chi tiết</span>
                        </div>
                    </a>
                </div>

                <div class="product-body">
                    <div class="product-category">Áo sơ mi nam</div>

                    <div class="product-name" th:text="${p.tenSanPham}"></div>

                    <div class="product-desc">
                        Thiết kế tối giản, dễ phối đồ và phù hợp nhiều hoàn cảnh.
                    </div>

                    <div class="price-current"
                         th:text="${#numbers.formatDecimal(p.giaMacDinh,0,'COMMA',0,'POINT')} + ' đ'">
                    </div>

                    <div class="product-meta">
                        <span>Form hiện đại</span>
                        <span>Dễ phối</span>
                    </div>



                        <a th:href="@{/shop/detail/{id}(id=${p.id})}" class="btn btn-buy">
                            Mua ngay
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <div class="empty-box" th:if="${products == null or #lists.isEmpty(products)}">
            Chưa có sản phẩm
        </div>

    </div>
</div>

<style>
    body{
        background:#f8f8f8;
        font-family: "Segoe UI", Arial;
    }

    /* HERO */
    .hero-banner{
        display:block;
        height:520px;
        border-radius:28px;
        overflow:hidden;
        box-shadow:0 10px 30px rgba(0,0,0,.06);
    }

    .hero-banner img{
        width:100%;
        height:100%;
        object-fit:cover;
        transition:.4s;
    }

    .hero-banner:hover img{
        transform:scale(1.03);
    }

    /* INTRO */
    .intro-section{
        text-align:center;
        margin:30px 0 40px;
    }

    .intro-content h2{
        font-weight:800;
    }

    .intro-content p{
        color:#666;
    }

    /* TITLE */
    .section-title{
        font-weight:800;
    }

    .section-subtitle{
        color:#777;
        font-size:14px;
    }

    /* GRID */
    .product-grid{
        display:grid;
        grid-template-columns:repeat(3,1fr);
        gap:24px;
    }

    /* CARD */
    .product-card{
        background:#fff;
        border-radius:24px;
        overflow:hidden;
        box-shadow:0 10px 30px rgba(0,0,0,.06);
        transition:.3s;
        display:flex;
        flex-direction:column;
    }

    .product-card:hover{
        transform:translateY(-6px);
    }

    /* IMAGE */
    .product-image-wrap{
        position:relative;
        height:300px;
    }

    .product-image{
        width:100%;
        height:100%;
        object-fit:cover;
    }

    .image-overlay{
        position:absolute;
        inset:0;
        background:rgba(0,0,0,.3);
        display:flex;
        align-items:end;
        justify-content:center;
        opacity:0;
        transition:.3s;
    }

    .product-card:hover .image-overlay{
        opacity:1;
    }

    .image-overlay span{
        background:#fff;
        padding:8px 16px;
        border-radius:20px;
        margin-bottom:14px;
        font-weight:700;
    }

    .product-badge{
        position:absolute;
        top:10px;
        left:10px;
        background:#111;
        color:#fff;
        padding:5px 10px;
        border-radius:20px;
        font-size:12px;
    }

    /* BODY */
    .product-body{
        padding:16px;
    }

    .product-category{
        font-size:12px;
        color:#caa15b;
        font-weight:700;
    }

    .product-name{
        font-weight:800;
        margin:6px 0;
    }

    .product-desc{
        font-size:14px;
        color:#666;
    }

    .price-current{
        color:#caa15b;
        font-weight:800;
        margin:10px 0;
    }

    .product-meta span{
        background:#f1f1f1;
        padding:5px 10px;
        border-radius:20px;
        font-size:12px;
    }

    /* BUTTON */
    .product-actions{
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:10px;
        margin-top:10px;
    }

    .btn-view{
        background:#111;
        color:#fff;
    }

    .btn-buy{
        border:1px solid #ccc;
    }

    .btn{
        height:42px;
        display:flex;
        align-items:center;
        justify-content:center;
        border-radius:12px;
        font-weight:700;
    }

    .empty-box{
        text-align:center;
        margin-top:40px;
    }
</style>

</body>
</html>
