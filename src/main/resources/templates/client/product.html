<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh sách sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
            font-family: Arial, sans-serif;
        }

        .page-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .filter-box {
            background: #fff;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            position: sticky;
            top: 20px;
        }

        .filter-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .filter-group {
            margin-bottom: 24px;
        }

        .filter-group h6 {
            font-weight: 700;
            margin-bottom: 12px;
        }

        .size-option {
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 8px 14px;
            background: #fff;
            transition: all 0.2s ease;
            cursor: pointer;
            font-weight: 500;
        }

        .size-option:hover {
            background: #000;
            color: #fff;
            border-color: #000;
        }

        .product-card {
            border: none;
            border-radius: 18px;
            overflow: hidden;
            background: #fff;
            box-shadow: 0 6px 20px rgba(0,0,0,0.06);
            transition: all 0.25s ease;
            height: 100%;
        }

        .product-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.12);
        }

        .product-image-wrap {
            position: relative;
            background: #f3f3f3;
        }

        .product-image {
            width: 100%;
            height: 320px;
            object-fit: cover;
        }

        .badge-custom {
            position: absolute;
            top: 14px;
            left: 14px;
            background: #000;
            color: #fff;
            font-size: 12px;
            padding: 6px 10px;
            border-radius: 20px;
            font-weight: 600;
        }

        .product-name {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 10px;
            min-height: 48px;
        }

        .price-current {
            color: #111;
            font-size: 24px;
            font-weight: 700;
        }

        .product-actions .btn {
            border-radius: 12px;
            font-weight: 600;
        }

        .sort-box {
            background: #fff;
            border-radius: 12px;
            padding: 8px 14px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.05);
        }

        .top-bar {
            margin-bottom: 20px;
        }

        .result-count {
            color: #666;
            font-size: 15px;
            margin-top: 8px;
        }

        .color-dots {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .color-dot {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 1px solid #ccc;
            display: inline-block;
        }

        .btn-view {
            background: #111;
            color: #fff;
            border: none;
        }

        .btn-view:hover {
            background: #333;
            color: #fff;
        }

        .btn-outline-dark {
            border-radius: 12px;
        }

        @media (max-width: 991px) {
            .filter-box {
                position: static;
                margin-bottom: 20px;
            }

            .page-title {
                font-size: 26px;
            }

            .product-image {
                height: 260px;
            }
        }
    </style>
</head>
<body>
<div th:replace="~{client/menu :: menu}"></div>

<div class="container py-4">
    <div class="row g-4 align-items-start">

        <!-- Nội dung sản phẩm -->
        <div class="col-lg-9">
            <div class="d-flex justify-content-between align-items-center flex-wrap top-bar">
                <div>
                    <h2 class="page-title">Danh sách sản phẩm</h2>
                    <div class="result-count">
                        Tổng:
                        <span th:text="${products != null ? #lists.size(products) : 0}">0</span> sản phẩm
                    </div>
                </div>

                <div class="sort-box mt-3 mt-lg-0">
                    <form method="get" th:action="@{/shop/product}" class="d-flex align-items-center gap-2">

                        <input type="hidden" name="mauIds"
                               th:each="m : ${selectedMauIds}"
                               th:value="${m}">

                        <input type="hidden" name="sizeIds"
                               th:each="s : ${selectedSizeIds}"
                               th:value="${s}">

                        <input type="hidden" name="prices"
                               th:each="p : ${selectedPrices}"
                               th:value="${p}">

                        <label class="fw-semibold mb-0">Sắp xếp:</label>

                        <select name="sort" class="form-select w-auto" onchange="this.form.submit()">
                            <option value="" th:selected="${selectedSort == null or selectedSort == ''}">Mặc định</option>
                            <option value="gia-tang" th:selected="${selectedSort == 'gia-tang'}">Giá tăng dần</option>
                            <option value="gia-giam" th:selected="${selectedSort == 'gia-giam'}">Giá giảm dần</option>
                        </select>
                    </form>
                </div>
            </div>

            <div class="row g-4">
                <div class="col-md-6 col-xl-4" th:each="p : ${products}">
                    <div class="product-card">

                        <div class="product-image-wrap">
                            <span class="badge-custom">Nổi bật</span>

                            <a th:href="@{/shop/detail/{id}(id=${p.id})}">
                                <img th:src="@{'/images/' + ${p.hinhAnh}}"
                                     class="product-image"
                                     alt="Ảnh sản phẩm">
                            </a>
                        </div>

                        <div class="p-3">
                            <div class="color-dots">
                                <span class="color-dot" style="background:#1f2a44;"></span>
                                <span class="color-dot" style="background:#d9d9d9;"></span>
                                <span class="color-dot" style="background:#8fa3bf;"></span>
                            </div>

                            <div class="product-name" th:text="${p.tenSanPham}">
                                Tên sản phẩm
                            </div>

                            <div class="mb-3">
                                <span class="price-current"
                                      th:text="${#numbers.formatDecimal(p.giaMacDinh,0,'COMMA',0,'POINT')} + 'đ'">
                                </span>
                            </div>

                            <div class="product-actions d-grid gap-2">
                                <a th:href="@{/shop/detail/{id}(id=${p.id})}"
                                   class="btn btn-view">
                                    Xem chi tiết
                                </a>

                                <a th:href="@{/shop/detail/{id}(id=${p.id})}"
                                   class="btn btn-outline-dark">
                                    Mua ngay
                                </a>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>

        <!-- Bộ lọc bên phải -->
        <div class="col-lg-3">
            <div th:replace="~{client/filter :: filter}"></div>
        </div>

    </div>
</div>

</body>
</html>
