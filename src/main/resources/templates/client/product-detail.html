<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${product.tenSanPham}">Chi tiết sản phẩm</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        .color-btn.active, .size-btn.active { border: 2px solid #000 !important; }
        .color-btn {
            width: 32px; height: 32px; border-radius: 50%;
            border: 1px solid #ccc; margin-right: 10px;
            display: inline-block; cursor: pointer;
        }
        .size-btn {
            padding: 6px 14px; border: 1px solid #ccc; margin-right: 10px;
            cursor: pointer; background: #f5f5f5; border-radius: 8px;
            display: inline-block;
        }
        .size-btn.disabled, .color-btn.disabled {
            opacity: .4; cursor: not-allowed;
        }
    </style>
</head>
<body>

<div class="container mt-5">

    <div class="row g-4">

        <!-- Ảnh -->
        <div class="col-md-6">
            <img th:src="@{'/images/' + ${product.hinhAnh}}"
                 id="mainImage"
                 class="img-fluid rounded shadow"
                 style="width:100%; max-height:520px; object-fit:cover;"
                 alt="product">
        </div>

        <!-- Thông tin -->
        <div class="col-md-6">

            <h2 class="fw-bold" th:text="${product.tenSanPham}"></h2>

            <h4 class="text-danger fw-bold mb-2" id="priceText"
                th:text="${#numbers.formatDecimal(product.giaMacDinh,0,'COMMA',0,'POINT')} + ' VND'">
            </h4>

            <div class="mb-3">
                <span class="text-muted">Tồn kho: </span>
                <span class="fw-bold" id="stockText">—</span>
            </div>

            <hr>

            <!-- Màu -->
            <h5 class="mb-2">Màu sắc</h5>
            <div id="colorGroup" class="mb-3">
                <span th:each="m : ${product.mauList}"
                      class="color-btn"
                      th:attr="data-color-id=${m.id}, title=${m.ten}">
                </span>
            </div>

            <!-- Size -->
            <h5 class="mb-2">Kích cỡ</h5>
            <div id="sizeGroup" class="mb-3">
                <span th:each="s : ${product.sizeList}"
                      class="size-btn"
                      th:text="${s.ten}"
                      th:attr="data-size-id=${s.id}">
                </span>
            </div>

            <hr>

            <form th:action="@{/cart/add}" method="post" id="addForm">
                <input type="hidden" name="spId" id="spHiddenId">

                <div class="d-flex gap-2 align-items-center mb-3">
                    <input type="number" name="quantity" value="1" min="1"
                           class="form-control" style="max-width:120px;">
                    <button class="btn btn-dark btn-lg flex-grow-1"
                            id="addBtn" type="submit" disabled>
                        Thêm vào giỏ hàng
                    </button>
                </div>

                <div class="text-danger small" id="msg"></div>
            </form>

        </div>

    </div>

</div>

<script th:inline="javascript">
    /*<![CDATA[*/
    const product = /*[[${product}]]*/ null;

    const priceText = document.getElementById("priceText");
    const stockText = document.getElementById("stockText");
    const imgEl = document.getElementById("mainImage");
    const hiddenId = document.getElementById("spHiddenId");
    const addBtn = document.getElementById("addBtn");
    const msg = document.getElementById("msg");

    let selectedColor = null;
    let selectedSize = null;

    function formatVND(n) {
        return new Intl.NumberFormat('vi-VN').format(n || 0) + " VND";
    }

    function clearMsg(){ msg.innerText = ""; }
    function setMsg(t){ msg.innerText = t || ""; }

    function setActive(selector, attrName, value) {
        document.querySelectorAll(selector).forEach(el => el.classList.remove("active"));
        const el = document.querySelector(`${selector}[${attrName}='${value}']`);
        if (el) el.classList.add("active");
    }

    function findVariant(colorId, sizeId) {
        const list = (product && product.chiTietList) ? product.chiTietList : [];
        return list.find(v =>
            Number(v.mauSacId) === Number(colorId) &&
            Number(v.kichCoId) === Number(sizeId)
        );
    }

    // (tạm thời) đổi ảnh: nếu bạn chưa trả về map ảnh theo màu, thì giữ ảnh mặc định
    function tryChangeImageByColor(colorId) {
        if (!product || !product.imageByColor) return;

        const file =
            product.imageByColor[colorId] ||
            product.imageByColor[String(colorId)];

        if (file) {
            imgEl.src = "/images/" + file;
        }
    }

    function updateUI() {
        clearMsg();

        if (!selectedColor || !selectedSize) {
            stockText.innerText = "—";
            hiddenId.value = "";
            addBtn.disabled = true;
            return;
        }

        const v = findVariant(selectedColor, selectedSize);

        if (!v) {
            priceText.innerText = formatVND(product.giaMacDinh);
            stockText.innerText = "0";
            hiddenId.value = "";
            addBtn.disabled = true;
            setMsg("Không có biến thể này.");
            return;
        }

        priceText.innerText = formatVND(v.giaBan);
        stockText.innerText = (v.soLuong ?? 0);
        hiddenId.value = v.id;
        addBtn.disabled = (v.soLuong ?? 0) <= 0;

        if ((v.soLuong ?? 0) <= 0) setMsg("Biến thể đã hết hàng.");
    }

    document.addEventListener("DOMContentLoaded", function () {
        if (!product) return;

        // set mặc định: lấy biến thể đầu tiên nếu có
        const first = (product.chiTietList && product.chiTietList.length > 0) ? product.chiTietList[0] : null;
        if (first) {
            selectedColor = first.mauSacId;
            selectedSize = first.kichCoId;

            setActive(".color-btn", "data-color-id", selectedColor);
            setActive(".size-btn", "data-size-id", selectedSize);
            tryChangeImageByColor(selectedColor);
        }

        updateUI();

        document.querySelectorAll(".color-btn").forEach(btn => {
            btn.addEventListener("click", function () {
                selectedColor = this.getAttribute("data-color-id");
                setActive(".color-btn", "data-color-id", selectedColor);
                tryChangeImageByColor(selectedColor);
                updateUI();
            });
        });

        document.querySelectorAll(".size-btn").forEach(btn => {
            btn.addEventListener("click", function () {
                selectedSize = this.getAttribute("data-size-id");
                setActive(".size-btn", "data-size-id", selectedSize);
                updateUI();
            });
        });

        // chặn submit nếu chưa có spId
        document.getElementById("addForm").addEventListener("submit", function (e) {
            if (!hiddenId.value) {
                e.preventDefault();
                setMsg("Vui lòng chọn màu và size hợp lệ.");
            }
        });
    });
    /*]]>*/
</script>

</body>
</html>
