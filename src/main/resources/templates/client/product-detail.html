<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title th:text="${product.tenSanPham}"></title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        .gallery{
            display:flex;
            gap:14px;
        }

        .thumbs{
            display:flex;
            flex-direction:column;
            gap:10px;
        }

        .thumb{
            width:84px;
            height:84px;
            object-fit:cover;
            border-radius:10px;
            border:1px solid #ddd;
            cursor:pointer;
        }

        .thumb.active{
            border:2px solid black;
        }

        .main-img{
            width:100%;
            max-height:540px;
            object-fit:cover;
            border-radius:12px;
        }

        .product-title{
            font-size:30px;
            font-weight:700;
        }

        .rating{
            color:#f5a623;
        }

        .price{
            font-size:32px;
            font-weight:700;
            color:#dc3545;
        }

        .shipping{
            color:#198754;
            font-weight:600;
        }

        .option-title{
            font-size:16px;
            font-weight:600;
            margin-bottom:10px;
        }

        .option-group{
            display:flex;
            flex-wrap:wrap;
            gap:14px;
        }

        .color-btn{
            width:74px;
            height:42px;
            border:2px solid #d8d8d8;
            border-radius:999px;
            background:white;
            display:flex;
            align-items:center;
            justify-content:center;
            cursor:pointer;
            padding:4px;
        }

        .color-btn.active{
            border-color:#2f49d1;
        }

        .color-fill{
            width:100%;
            height:100%;
            border-radius:999px;
            border:1px solid #ccc;
        }

        .size-btn{
            min-width:88px;
            height:54px;
            background:#d9d9d9;
            border-radius:14px;
            font-size:18px;
            display:flex;
            align-items:center;
            justify-content:center;
            cursor:pointer;
        }

        .size-btn.active{
            background:black;
            color:white;
            font-weight:700;
        }

        .size-btn.disabled{
            opacity:.4;
            cursor:not-allowed;
        }

    </style>

</head>

<body>

<div th:replace="~{client/menu :: menu}"></div>

<div class="container mt-5">

    <div class="row g-4">

        <!-- gallery -->
        <div class="col-md-6">

            <div class="gallery">

                <div class="thumbs">

                    <img th:each="img : ${product.images}"
                         th:src="@{'/images/' + ${img}}"
                         class="thumb"
                         onclick="changeMain(this.src,this)">

                </div>

                <img th:src="@{'/images/' + ${product.hinhAnh}}"
                     id="mainImage"
                     class="main-img">

            </div>

        </div>


        <!-- info -->
        <div class="col-md-6">

            <h1 class="product-title" th:text="${product.tenSanPham}"></h1>

            <div class="rating mb-2">
                ★★★★★ (5.0)
            </div>

            <div class="price mb-2"
                 th:text="${#numbers.formatDecimal(product.giaMacDinh,0,'COMMA',0,'POINT')} + ' VND'">
            </div>

            <div class="shipping mb-3">
                🚚 Freeship toàn quốc
            </div>

            <div class="mb-3">
                Tồn kho: <b id="stockText">—</b>
            </div>


            <div class="option-title">
                Màu sắc: <span id="selectedColorText">—</span>
            </div>

            <div id="colorGroup" class="option-group mb-4">

<span th:each="m : ${product.mauList}"
      class="color-btn"
      th:attr="data-color-id=${m.id}, data-color-name=${m.ten}, title=${m.ten}">

<span class="color-fill"></span>

</span>

            </div>


            <div class="option-title">
                Kích thước: <span id="selectedSizeText">—</span>
            </div>

            <div id="sizeGroup" class="option-group mb-4">

<span th:each="s : ${product.sizeList}"
      class="size-btn"
      th:text="${s.ten}"
      th:attr="data-size-id=${s.id}, data-size-name=${s.ten}">
</span>

            </div>


            <form th:action="@{/cart/add}" method="post" id="addForm">

                <input type="hidden" name="spId" id="spHiddenId">

                <div class="d-flex gap-2">

                    <input type="number"
                           name="quantity"
                           id="qtyInput"
                           value="1"
                           min="1"
                           class="form-control"
                           style="max-width:120px">

                    <button class="btn btn-dark flex-grow-1"
                            id="addBtn"
                            disabled>

                        Thêm vào giỏ hàng

                    </button>

                </div>

                <div id="msg" class="text-danger mt-2"></div>

            </form>

        </div>

    </div>

</div>


<script th:inline="javascript">
    const product = [[${product}]];
    const cartQtyMap = [[${cartQtyMap}]];

    let selectedColor = null;
    let selectedSize = null;

    const stockText = document.getElementById("stockText");
    const hiddenId = document.getElementById("spHiddenId");
    const addBtn = document.getElementById("addBtn");
    const qtyInput = document.getElementById("qtyInput");

    const selectedColorText = document.getElementById("selectedColorText");
    const selectedSizeText = document.getElementById("selectedSizeText");

    function changeMain(src, thumb) {
        document.getElementById("mainImage").src = src;

        document.querySelectorAll(".thumb")
            .forEach(t => t.classList.remove("active"));

        thumb.classList.add("active");
    }

    function getColorCode(colorName) {
        const name = colorName
            .toLowerCase()
            .normalize("NFD")
            .replace(/[\u0300-\u036f]/g, "")
            .replace(/đ/g, "d")
            .trim();

        const map = {
            "do": "#e53935",
            "den": "#111111",
            "trang": "#ffffff",
            "xam": "#9e9e9e",
            "ghi": "#9e9e9e",
            "bac": "#c0c0c0",
            "xanh": "#4caf50",
            "xanh la": "#43a047",
            "xanh duong": "#1e88e5",
            "xanh navy": "#1f2a44",
            "xanh da troi": "#81d4fa",
            "vang": "#fdd835",
            "cam": "#fb8c00",
            "hong": "#ec407a",
            "tim": "#8e24aa",
            "nau": "#8d6e63",
            "be": "#d7ccc8"
        };

        return map[name] || "#ccc";
    }

    function findVariant(color, size) {
        return product.chiTietList.find(v =>
            v.mauSacId == color &&
            v.kichCoId == size
        );
    }

    function getCartQty(variantId) {
        if (!cartQtyMap) return 0;
        return cartQtyMap[variantId] ? parseInt(cartQtyMap[variantId]) : 0;
    }

    function updateUI() {
        if (!selectedColor || !selectedSize) {
            stockText.innerText = "—";
            hiddenId.value = "";
            qtyInput.value = 1;
            qtyInput.max = 1;
            addBtn.disabled = true;
            return;
        }

        const v = findVariant(selectedColor, selectedSize);

        if (!v) {
            stockText.innerText = "0";
            hiddenId.value = "";
            qtyInput.value = 1;
            qtyInput.max = 1;
            addBtn.disabled = true;
            return;
        }

        const tonKhoDB = v.soLuong || 0;
        const soLuongTrongGio = getCartQty(v.id);
        const coTheThem = Math.max(0, tonKhoDB - soLuongTrongGio);

        stockText.innerText = coTheThem;
        hiddenId.value = v.id;

        qtyInput.max = coTheThem > 0 ? coTheThem : 1;

        let currentQty = parseInt(qtyInput.value) || 1;

        if (coTheThem <= 0) {
            qtyInput.value = 1;
            addBtn.disabled = true;
            return;
        }

        if (currentQty > coTheThem) {
            qtyInput.value = coTheThem;
        }

        if (currentQty < 1) {
            qtyInput.value = 1;
        }

        addBtn.disabled = false;
    }

    function setActiveColor(id) {
        document.querySelectorAll(".color-btn")
            .forEach(b => {
                b.classList.remove("active");

                if (b.dataset.colorId == id) {
                    b.classList.add("active");
                }
            });
    }

    function setActiveSize(id) {
        document.querySelectorAll(".size-btn")
            .forEach(b => {
                b.classList.remove("active");

                if (b.dataset.sizeId == id) {
                    b.classList.add("active");
                }
            });
    }

    function updateSelectedTexts() {
        const c = document.querySelector(".color-btn.active");
        const s = document.querySelector(".size-btn.active");

        selectedColorText.innerText = c ? c.dataset.colorName : "—";
        selectedSizeText.innerText = s ? s.dataset.sizeName : "—";
    }

    document.addEventListener("DOMContentLoaded", () => {
        document.querySelectorAll(".color-btn").forEach(btn => {
            const name = btn.dataset.colorName;
            const box = btn.querySelector(".color-fill");
            box.style.background = getColorCode(name);
        });

        const first = product.chiTietList[0];

        if (first) {
            selectedColor = first.mauSacId;
            selectedSize = first.kichCoId;

            setActiveColor(selectedColor);
            setActiveSize(selectedSize);

            updateSelectedTexts();
            updateUI();
        }
    });

    document.querySelectorAll(".color-btn").forEach(btn => {
        btn.onclick = function () {
            selectedColor = this.dataset.colorId;

            setActiveColor(selectedColor);
            updateSelectedTexts();
            updateUI();
        };
    });

    document.querySelectorAll(".size-btn").forEach(btn => {
        btn.onclick = function () {
            if (this.classList.contains("disabled")) return;

            selectedSize = this.dataset.sizeId;

            setActiveSize(selectedSize);
            updateSelectedTexts();
            updateUI();
        };
    });

    qtyInput.addEventListener("input", function () {
        const stock = parseInt(stockText.innerText) || 0;
        let value = parseInt(this.value) || 1;

        if (stock <= 0) {
            this.value = 1;
            return;
        }

        if (value > stock) {
            this.value = stock;
        }

        if (value < 1) {
            this.value = 1;
        }
    });
</script>

</body>
</html>
