<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thanh toán</title>

    <meta http-equiv="Cache-Control" content="no-store"/>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div th:replace="~{client/menu :: menu}"></div>

<div class="container mt-5 mb-5">

    <div class="row g-4">

        <!-- LEFT -->

        <div class="col-lg-7">

            <div class="card p-4 shadow-sm">

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h3 class="mb-0">Thông tin nhận hàng</h3>

                    <a th:href="@{/cart}" class="btn btn-outline-secondary">
                        Quay lại giỏ hàng
                    </a>

                </div>

                <form id="checkoutForm" th:action="@{/order/place}" method="post">

                    <!-- selected ids -->

                    <div th:each="item : ${checkoutItems}">
                        <input type="hidden" name="selectedIds" th:value="${item.id}">
                    </div>


                    <div class="mb-3">
                        <label class="form-label">Tên người nhận</label>

                        <input
                                type="text"
                                name="tenNguoiNhan"
                                class="form-control"
                                required
                                th:value="${tenNguoiNhan != null ? tenNguoiNhan : khachHang.hoTen}"
                        >
                    </div>


                    <div class="mb-3">

                        <label class="form-label">Số điện thoại</label>

                        <input
                                type="text"
                                name="soDienThoai"
                                class="form-control"
                                required
                                pattern="[0-9]{9,11}"
                                title="Số điện thoại không hợp lệ"
                                th:value="${soDienThoai != null ? soDienThoai : khachHang.soDienThoai}"
                        >

                    </div>


                    <div class="mb-3">

                        <label class="form-label">Địa chỉ giao hàng</label>

                        <textarea
                                name="diaChiGiaoHang"
                                class="form-control"
                                rows="3"
                                required
                                th:text="${diaChiGiaoHang != null ? diaChiGiaoHang : khachHang.diaChi}"
                        ></textarea>

                    </div>


                    <div class="mb-3">

                        <label class="form-label">Ghi chú</label>

                        <textarea
                                name="ghiChu"
                                class="form-control"
                                rows="3"
                                th:text="${ghiChu}"
                        ></textarea>

                    </div>



                    <!-- COUPON -->

                    <div class="mb-3">

                        <label class="form-label">Mã giảm giá</label>

                        <div class="d-flex gap-2">

                            <input
                                    type="text"
                                    name="maKhuyenMai"
                                    class="form-control"
                                    placeholder="Nhập mã giảm giá (nếu có)"
                                    th:value="${maKhuyenMai}"
                            >

                            <button
                                    type="submit"
                                    name="action"
                                    value="applyCoupon"
                                    class="btn btn-outline-primary">

                                Áp dụng mã

                            </button>

                        </div>

                    </div>



                    <!-- ERRORS -->

                    <div th:if="${couponSuccess}" class="alert alert-success py-2">
                        Áp dụng mã giảm giá thành công
                    </div>

                    <div th:if="${couponError == 'not_found'}" class="alert alert-danger py-2">
                        Mã giảm giá không tồn tại
                    </div>

                    <div th:if="${couponError == 'not_started'}" class="alert alert-danger py-2">
                        Mã chưa bắt đầu
                    </div>

                    <div th:if="${couponError == 'expired'}" class="alert alert-danger py-2">
                        Mã đã hết hạn
                    </div>

                    <div th:if="${couponError == 'out_of_stock'}" class="alert alert-danger py-2">
                        Mã đã hết lượt
                    </div>

                    <div th:if="${couponError == 'inactive'}" class="alert alert-danger py-2">
                        Mã không hoạt động
                    </div>

                    <div th:if="${couponError == 'min_order'}" class="alert alert-danger py-2">
                        Đơn chưa đạt giá trị tối thiểu
                    </div>



                    <!-- PAYMENT -->

                    <div class="mb-3">

                        <label class="form-label">Phương thức thanh toán</label>

                        <select name="phuongThucThanhToan" class="form-select" required>

                            <option value="COD"
                                    th:selected="${phuongThucThanhToan == null or phuongThucThanhToan == 'COD'}">
                                Thanh toán khi nhận hàng
                            </option>

                            <option value="VNPAY"
                                    th:selected="${phuongThucThanhToan == 'VNPAY'}">
                                Thanh toán VNPAY
                            </option>

                        </select>

                    </div>



                    <div class="d-flex gap-2">

                        <button
                                id="submitBtn"
                                type="submit"
                                name="action"
                                value="placeOrder"
                                class="btn btn-success btn-lg">

                            Đặt hàng

                        </button>

                        <a th:href="@{/cart}" class="btn btn-outline-secondary btn-lg">
                            Quay lại giỏ hàng
                        </a>

                    </div>

                </form>

            </div>

        </div>


        <!-- RIGHT -->

        <div class="col-lg-5">

            <div class="card p-4 shadow-sm">

                <h4 class="mb-3">Đơn hàng của bạn</h4>

                <div th:each="item : ${checkoutItems}" class="border-bottom pb-3 mb-3">

                    <strong th:text="${item.sanPhamChiTiet.sanPham.tenSanPham}"></strong><br>

                    Size:
                    <span th:text="${item.sanPhamChiTiet.kichCo.tenKichCo}"></span>

                    |

                    Màu:
                    <span th:text="${item.sanPhamChiTiet.mauSac.tenMau}"></span><br>

                    SL:
                    <span th:text="${item.soLuong}"></span><br>

                    Giá:

                    <span th:text="${#numbers.formatDecimal(item.sanPhamChiTiet.giaBan,0,'COMMA',0,'POINT')} + ' VND'"></span>

                </div>



                <div class="mb-2 d-flex justify-content-between">

                    <span>Tổng tiền gốc</span>

                    <strong th:text="${#numbers.formatDecimal(tongTienGoc != null ? tongTienGoc : tongTien,0,'COMMA',0,'POINT')} + ' VND'"></strong>

                </div>


                <div class="mb-2 d-flex justify-content-between">

                    <span>Tiền giảm</span>

                    <strong class="text-success"
                            th:text="${#numbers.formatDecimal(tienGiam != null ? tienGiam : 0,0,'COMMA',0,'POINT')} + ' VND'"></strong>

                </div>


                <div class="mb-2 d-flex justify-content-between border-top pt-2">

                    <span>Tổng thanh toán</span>

                    <strong class="text-danger"
                            th:text="${#numbers.formatDecimal(tongThanhToan != null ? tongThanhToan : tongTien,0,'COMMA',0,'POINT')} + ' VND'"></strong>

                </div>


            </div>

        </div>

    </div>

</div>


<script>

    document.getElementById("checkoutForm").addEventListener("submit", function(){

        document.getElementById("submitBtn").disabled = true;

    });

</script>

</body>
</html>
