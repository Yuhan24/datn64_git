<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thanh toán</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{client/menu :: menu}"></div>

<div class="container mt-5 mb-5">
    <div class="row g-4">
        <div class="col-lg-7">
            <div class="card p-4 shadow-sm">
                <h3 class="mb-4">Thông tin nhận hàng</h3>

                <form th:action="@{/order/place}" method="post">
                    <div th:each="item : ${checkoutItems}">
                        <input type="hidden" name="selectedIds" th:value="${item.id}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Tên người nhận</label>
                        <input type="text" name="tenNguoiNhan" class="form-control"
                               th:value="${khachHang.hoTen}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Số điện thoại</label>
                        <input type="text" name="soDienThoai" class="form-control"
                               th:value="${khachHang.soDienThoai}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Địa chỉ giao hàng</label>
                        <textarea name="diaChiGiaoHang" class="form-control" rows="3" required
                                  th:text="${khachHang.diaChi}"></textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Ghi chú</label>
                        <textarea name="ghiChu" class="form-control" rows="3"></textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Phương thức thanh toán</label>
                        <select name="phuongThucThanhToan" class="form-select" required>
                            <option value="COD">Thanh toán khi nhận hàng</option>
                            <option value="BANK_TRANSFER">Chuyển khoản</option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-success btn-lg">
                        Đặt hàng
                    </button>
                </form>
            </div>
        </div>

        <div class="col-lg-5">
            <div class="card p-4 shadow-sm">
                <h4 class="mb-3">Đơn hàng của bạn</h4>

                <div th:each="item : ${checkoutItems}" class="border-bottom pb-3 mb-3">
                    <strong th:text="${item.sanPhamChiTiet.sanPham.tenSanPham}"></strong><br>
                    Size: <span th:text="${item.sanPhamChiTiet.kichCo.tenKichCo}"></span> |
                    Màu: <span th:text="${item.sanPhamChiTiet.mauSac.tenMau}"></span><br>
                    SL: <span th:text="${item.soLuong}"></span><br>
                    Giá: <span th:text="${#numbers.formatDecimal(item.sanPhamChiTiet.giaBan,0,'COMMA',0,'POINT')} + ' VND'"></span>
                </div>

                <div class="d-flex justify-content-between">
                    <span>Tổng tiền</span>
                    <strong class="text-danger"
                            th:text="${#numbers.formatDecimal(tongTien,0,'COMMA',0,'POINT')} + ' VND'"></strong>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
