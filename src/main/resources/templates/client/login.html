<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập - HaLy</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(180deg, #f8f8f8 0%, #f3f4f6 100%);
            color: #1f2937;
            min-height: 100vh;
        }

        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 16px;
        }

        .auth-card {
            width: 100%;
            max-width: 520px;
            background: #ffffff;
            border: 1px solid #ececec;
            border-radius: 28px;
            padding: 36px 32px;
            box-shadow: 0 20px 60px rgba(15, 23, 42, 0.08);
        }

        .brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 34px;
            font-weight: 800;
            color: #16213e;
            margin-bottom: 12px;
        }

        .brand-dot {
            width: 15px;
            height: 15px;
            border-radius: 50%;
            background: #d4af37;
            box-shadow: 0 0 0 6px rgba(212, 175, 55, 0.14);
        }

        .subtitle {
            text-align: center;
            font-size: 15px;
            color: #6b7280;
            margin-bottom: 28px;
            line-height: 1.6;
        }

        .title {
            text-align: center;
            font-size: 34px;
            font-weight: 800;
            color: #16213e;
            margin-bottom: 28px;
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 14px;
            font-weight: 600;
            color: #374151;
        }

        .form-group input {
            width: 100%;
            height: 54px;
            border: 1px solid #e5e7eb;
            background: #f9fafb;
            border-radius: 16px;
            padding: 0 16px;
            font-size: 15px;
            color: #111827;
            outline: none;
            transition: all 0.25s ease;
        }

        .form-group input:focus {
            border-color: #d4af37;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.12);
        }

        .form-group input::placeholder {
            color: #9ca3af;
        }

        .auth-btn {
            width: 100%;
            height: 54px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, #16213e 0%, #1f2a44 70%, #d4af37 140%);
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.25s ease;
            margin-top: 6px;
        }

        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(22, 33, 62, 0.18);
        }

        .message {
            font-size: 14px;
            padding: 12px 14px;
            border-radius: 14px;
            font-weight: 500;
        }

        .message.error {
            background: #fef2f2;
            color: #b91c1c;
            border: 1px solid #fecaca;
        }

        .bottom-text {
            text-align: center;
            margin-top: 22px;
            font-size: 15px;
            color: #6b7280;
        }

        .bottom-text a {
            color: #16213e;
            font-weight: 700;
            text-decoration: none;
        }

        .bottom-text a:hover {
            color: #d4af37;
        }

        @media (max-width: 576px) {
            .auth-card {
                padding: 28px 20px;
                border-radius: 22px;
            }

            .brand {
                font-size: 28px;
            }

            .title {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>

<section class="auth-page">
    <div class="auth-card">
        <div class="brand">
            <span class="brand-dot"></span>
            <span>HaLy</span>
        </div>

        <p class="subtitle">Đăng nhập để tiếp tục mua sắm tại HaLy</p>

        <h2 class="title">Chào mừng quay lại</h2>

        <form th:action="@{/login}" method="post" class="auth-form">
            <div class="form-group">
                <label for="username">Tên đăng nhập</label>
                <input id="username" type="text" name="username" placeholder="Nhập tên đăng nhập" required>
            </div>

            <div class="form-group">
                <label for="password">Mật khẩu</label>
                <input id="password" type="password" name="password" placeholder="Nhập mật khẩu" required>
            </div>

            <p class="message error" th:if="${param.error}">
                Sai tài khoản hoặc mật khẩu
            </p>

            <button type="submit" class="auth-btn">Đăng nhập</button>
        </form>

        <div class="bottom-text">
            Chưa có tài khoản?
            <a th:href="@{/register}">Đăng ký ngay</a>
        </div>
    </div>
</section>

</body>
</html>
