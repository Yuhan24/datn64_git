<section xmlns:th="http://www.thymeleaf.org" th:fragment="content">
    <div class="card">
        <h3 style="margin-top:0">Màu sắc</h3>
        <div th:if="${success}" class="alert success" th:text="${success}"></div>
        <div th:if="${error}" class="alert error" th:text="${error}"></div>

        <form th:action="@{/admin/color/save}" method="post" th:object="${mauSac}"
              style="display:flex; gap:10px; align-items:end; margin-bottom:12px;">
            <div style="flex:1">
                <label>Tên màu</label>
                <input class="input" type="text" th:field="*{tenMau}" required>
            </div>
            <button class="btn" type="submit">Thêm</button>
        </form>

        <table class="table">
            <thead>
            <tr>
                <th>ID</th>
                <th>Tên màu</th>
                <th>Trạng thái</th>
                <th>Hành động</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="c : ${listMauSac}">
                <td th:text="${c.id}"></td>
                <td th:text="${c.tenMau}"></td>
                <td th:text="${c.trangThai ? 'Hoạt động' : 'Ngừng'}"></td>
                <td>
                    <form th:action="@{'/admin/color/' + ${c.id} + '/toggle-status'}"
                          method="post" style="display:inline;">
                        <input type="hidden" th:if="${_csrf != null}"
                               th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button type="submit"
                                class="btn small"
                                th:classappend="${c.trangThai ? ' danger' : ' success'}"
                                th:text="${c.trangThai ? 'Ngừng' : 'Bật'}">
                        </button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</section>
