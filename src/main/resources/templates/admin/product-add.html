<section xmlns:th="http://www.thymeleaf.org" th:fragment="content">

    <div class="card">
        <h3>Thêm sản phẩm</h3>

        <div th:if="${error}" class="alert error" th:text="${error}"></div>
        <div th:if="${success}" class="alert success" th:text="${success}"></div>

        <form th:action="@{/admin/product/save}"
              th:object="${sanPham}"
              method="post">

            <label>Mã sản phẩm</label>
            <input type="text" th:field="*{maSanPham}">

            <label>Tên sản phẩm</label>
            <input type="text" th:field="*{tenSanPham}">

            <label>Chất liệu</label>
            <input type="text" th:field="*{chatLieu}">

            <label>Thương hiệu</label>
            <select th:field="*{thuongHieu}">
                <option value="">--Chọn--</option>
                <option th:each="th : ${listThuongHieu}"
                        th:value="${th.id}"
                        th:text="${th.tenThuongHieu}">
                </option>
            </select>

            <label>Danh mục</label>
            <select th:field="*{danhMuc}">
                <option value="">--Chọn--</option>
                <option th:each="dm : ${listDanhMuc}"
                        th:value="${dm.id}"
                        th:text="${dm.tenDanhMuc}">
                </option>
            </select>

            <label>Mô tả</label>
            <textarea th:field="*{moTa}" rows="4"></textarea>

            <input type="hidden" th:if="${_csrf != null}"
                   th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div style="display:flex;gap:10px;margin-top:16px">
                <button class="btn success" type="submit">Lưu</button>
                <a class="btn" th:href="@{/admin/product}">Quay lại</a>
            </div>
        </form>
    </div>
</section>
