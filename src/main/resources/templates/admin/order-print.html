<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hóa đơn</title>
    <style>
        body{font-family:Arial,sans-serif;margin:30px;color:#111}
        .wrap{max-width:800px;margin:auto}
        h2,h3,p{margin:0 0 10px}
        .top{display:flex;justify-content:space-between;margin-bottom:20px}
        table{width:100%;border-collapse:collapse;margin-top:20px}
        th,td{border:1px solid #ddd;padding:10px;text-align:left}
        th{background:#f5f5f5}
        .total{margin-top:20px;text-align:right;font-size:18px;font-weight:700}
        .print-btn{margin-top:20px}
        @media print {
            .print-btn{display:none}
        }
    </style>
</head>
<body>
<div class="wrap">
    <div class="top">
        <div>
            <h2>HÓA ĐƠN BÁN HÀNG</h2>
            <p>Mã hóa đơn: <b th:text="${donHang.maDonHang}"></b></p>
            <p>Ngày tạo: <span th:text="${donHang.ngayTao}"></span></p>
        </div>
        <div>
            <p>Nhân viên:
                <b th:text="${donHang.nhanVien != null ? donHang.nhanVien.hoTen : '-'}"></b>
            </p>
            <p>Khách hàng:
                <b th:text="${donHang.tenNguoiNhan != null and !#strings.isEmpty(donHang.tenNguoiNhan)
        ? donHang.tenNguoiNhan
        : (donHang.khachHang != null ? donHang.khachHang.hoTen : 'Khách vãng lai')}"></b>
            </p>
            <p>SĐT:
                <span th:text="${donHang.soDienThoai != null ? donHang.soDienThoai : '-'}"></span>
            </p>
        </div>
    </div>

    <table>
        <thead>
        <tr>
            <th>Tên sản phẩm</th>
            <th>Màu</th>
            <th>Size</th>
            <th>Số lượng</th>
            <th>Đơn giá</th>
            <th>Thành tiền</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="ct : ${chiTietList}">
            <td th:text="${ct.sanPhamChiTiet.sanPham.tenSanPham}"></td>
            <td th:text="${ct.sanPhamChiTiet.mauSac.tenMau}"></td>
            <td th:text="${ct.sanPhamChiTiet.kichCo.tenKichCo}"></td>
            <td th:text="${ct.soLuong}"></td>
            <td th:text="${#numbers.formatDecimal(ct.giaTaiThoiDiem,0,'COMMA',0,'POINT')} + ' đ'"></td>
            <td th:text="${ct.giaTaiThoiDiem != null && ct.soLuong != null
    ? #numbers.formatDecimal(ct.giaTaiThoiDiem * ct.soLuong, 0, 'COMMA', 0, 'POINT') + ' đ'
    : '0 đ'}">
            </td>
        </tr>
        </tbody>
    </table>

    <div class="total">
        Tổng tiền:
        <span th:text="${#numbers.formatDecimal(donHang.tongTien,0,'COMMA',0,'POINT')} + ' đ'"></span>
    </div>

    <div class="print-btn">
        <button onclick="window.print()">In hóa đơn</button>
    </div>
</div>
</body>
</html>
