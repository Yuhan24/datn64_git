<div xmlns:th="http://www.thymeleaf.org" th:fragment="content">
    <style>
        * {
            box-sizing: border-box;
        }


        .voucher-page {
            min-height: 100vh;
            background: linear-gradient(135deg, #f8fafc, #eef2ff);
            padding: 32px 16px;
        }

        .voucher-card {
            max-width: 900px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 20px;
            padding: 32px;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
            border: 1px solid #e5e7eb;
        }

        .voucher-header {
            margin-bottom: 24px;
        }

        .voucher-title {
            font-size: 28px;
            font-weight: 700;
            color: #111827;
            margin: 0 0 8px;
        }

        .voucher-subtitle {
            font-size: 14px;
            color: #6b7280;
            margin: 0;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            margin-bottom: 18px;
            font-weight: 500;
        }

        .alert-danger {
            background: #fef2f2;
            color: #b91c1c;
            border: 1px solid #fecaca;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 18px 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group.col-2 {
            grid-column: span 2;
        }

        .form-group.col-3 {
            grid-column: 1 / -1;
        }

        .form-label {
            font-size: 14px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 8px;
        }

        .form-control,
        .form-select {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #d1d5db;
            border-radius: 12px;
            font-size: 15px;
            color: #111827;
            background: #fff;
            outline: none;
            transition: all 0.25s ease;
        }

        .form-control:focus,
        .form-select:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.12);
        }

        .form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 28px;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            border: none;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .btn-secondary {
            background: #f3f4f6;
            color: #374151;
            border: 1px solid #d1d5db;
        }

        .btn-secondary:hover {
            background: #e5e7eb;
        }

        .btn-success {
            background: #10b981;
            color: #ffffff;
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.22);
        }

        .btn-success:hover {
            background: #059669;
            transform: translateY(-1px);
        }

        @media (max-width: 992px) {
            .form-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .voucher-card {
                padding: 22px;
                border-radius: 16px;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .form-group.col-2,
            .form-group.col-3 {
                grid-column: auto;
            }

            .voucher-title {
                font-size: 24px;
            }
        }
    </style>

    <div class="voucher-page">
        <div class="voucher-card">
            <div class="voucher-header">
                <h4 class="voucher-title">Thêm khuyến mãi</h4>
                <p class="voucher-subtitle">Điền thông tin khuyến mãi vào biểu mẫu bên dưới.</p>
            </div>

            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <form th:action="@{/admin/voucher/save}" method="post" th:object="${voucher}">
                <div class="form-grid">

                    <div class="form-group">
                        <label class="form-label">Mã khuyến mãi</label>
                        <input type="text" class="form-control" th:field="*{maKhuyenMai}" placeholder="Nhập mã khuyến mãi" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Tên khuyến mãi</label>
                        <input type="text" class="form-control" th:field="*{tenKhuyenMai}" placeholder="Nhập tên khuyến mãi" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Loại giảm</label>
                        <select class="form-select" th:field="*{loaiGiam}">
                            <option th:value="true">Giảm theo %</option>
                            <option th:value="false">Giảm tiền</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Giá trị giảm</label>
                        <input type="number" class="form-control" th:field="*{giaTriGiam}" min="1" placeholder="Nhập giá trị giảm" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Giá trị đơn tối thiểu</label>
                        <input type="number" class="form-control" th:field="*{giaTriDonToiThieu}" min="0" placeholder="Nhập giá trị đơn tối thiểu">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Số lượng</label>
                        <input type="number" class="form-control" th:field="*{soLuong}" min="1" placeholder="Nhập số lượng" required>
                    </div>

                    <div class="form-group col-2">
                        <label class="form-label">Ngày bắt đầu</label>
                        <input type="datetime-local" class="form-control" th:field="*{ngayBatDau}" required>
                    </div>

                    <div class="form-group col-2">
                        <label class="form-label">Ngày kết thúc</label>
                        <input type="datetime-local" class="form-control" th:field="*{ngayKetThuc}" required>
                    </div>
                </div>

                <div class="form-actions">
                    <a th:href="@{/admin/voucher}" class="btn btn-secondary">Quay lại</a>
                    <button type="submit" class="btn btn-success">Lưu khuyến mãi</button>
                </div>
            </form>
        </div>
    </div>
</div>
